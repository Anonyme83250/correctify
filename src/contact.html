<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Correctify</title>
  <style>
    :root {
      --brand:#1fa2d6; --brand-d:#1382b3; --ink:#15212e; --muted:#566875;
      --bg:#fff; --soft:#f3f9fc; --border:#e4eef4; --radius:16px;
      --grad:linear-gradient(135deg,#2bb4e8,#1382c4);
      --shadow:0 10px 30px rgba(20,130,196,.12);
      --eyebrow-bg:#e3f4fc;
      --font:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    * { box-sizing:border-box; }
    html, body { height:100%; }
    body {
      margin:0; overflow:hidden; font-family:var(--font); color:var(--ink);
      background: radial-gradient(760px 280px at 50% -18%, var(--eyebrow-bg), transparent 70%), var(--bg);
      user-select:none; display:flex; flex-direction:column;
    }
    .titlebar {
      flex:0 0 auto; height:48px; display:flex; align-items:center; justify-content:space-between;
      padding:0 8px 0 16px; -webkit-app-region:drag;
    }
    .brand { display:flex; align-items:center; gap:9px; font-weight:800; font-size:15px; }
    .brand .logo { width:26px; height:26px; border-radius:7px; object-fit:contain; display:block; }
    .winbtns { -webkit-app-region:no-drag; }
    .close {
      width:30px; height:30px; border:none; border-radius:8px; cursor:pointer;
      background:transparent; color:var(--muted); font-size:15px; line-height:1; transition:.15s;
    }
    .close:hover { background:#fdecec; color:#e0556a; }

    .wrap { padding:2px 18px 18px; flex:1 1 auto; overflow-y:auto; scrollbar-gutter:stable; }
    .wrap::-webkit-scrollbar { width:8px; }
    .wrap::-webkit-scrollbar-thumb { background:#cfe0e9; border-radius:8px; }
    .wrap::-webkit-scrollbar-thumb:hover { background:#aecbd9; }

    .eyebrow {
      display:inline-block; font-weight:700; font-size:10.5px; letter-spacing:.4px;
      color:var(--brand-d); background:var(--eyebrow-bg); padding:4px 11px; border-radius:999px;
    }
    .sub { color:var(--muted); font-size:12px; margin:9px 0 14px; line-height:1.5; }

    .card {
      background:#fff; border:1px solid var(--border); border-radius:var(--radius);
      padding:14px; margin-bottom:11px; box-shadow:0 1px 2px rgba(20,130,196,.04);
    }
    label { font-size:12.5px; font-weight:700; color:var(--ink); display:block; }
    .field { margin-top:9px; }
    input[type="text"], input[type="email"], select, textarea {
      width:100%; padding:10px 12px; border-radius:11px; border:1px solid var(--border);
      background:#fff; color:var(--ink); font-size:12.5px; transition:.15s; user-select:text;
      font-family:var(--font);
    }
    input::placeholder, textarea::placeholder { color:#9fb0bc; }
    select { cursor:pointer; }
    textarea { resize:vertical; min-height:104px; line-height:1.5; }
    input:focus, select:focus, textarea:focus {
      outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(31,162,214,.16);
    }
    .two { display:flex; gap:10px; }
    .two > div { flex:1 1 0; }

    .actions { margin-top:4px; }
    button.btn { width:100%; font-size:13.5px; font-weight:700; border-radius:12px; padding:12px 16px; border:none; cursor:pointer; transition:.15s; }
    .primary { color:#fff; background:var(--grad); box-shadow:var(--shadow); }
    .primary:hover { filter:brightness(1.05); }
    .primary:disabled { opacity:.6; cursor:default; filter:none; }
    .primary.ok { background:linear-gradient(135deg,#33d28f,#1b9e5a); box-shadow:0 8px 22px rgba(27,158,90,.35); }
    .status { margin:10px 0 0; font-size:12px; line-height:1.5; min-height:1em; color:#c0392b; }

    /* ----- Mode sombre (data-theme="dark" sur <html>, posé par contact.js) ---- */
    :root[data-theme="dark"] {
      --brand-d:#7ad2f5; --ink:#e6eef5; --muted:#92a4b3;
      --bg:#0e1620; --soft:#172530; --border:#27343f;
      --shadow:0 10px 30px rgba(0,0,0,.5);
      --eyebrow-bg:#102c3b;
    }
    :root[data-theme="dark"] .card { background:#16222e; box-shadow:0 1px 2px rgba(0,0,0,.3); }
    :root[data-theme="dark"] input[type="text"],
    :root[data-theme="dark"] input[type="email"],
    :root[data-theme="dark"] select,
    :root[data-theme="dark"] textarea { background:#0f1a24; }
    :root[data-theme="dark"] input::placeholder,
    :root[data-theme="dark"] textarea::placeholder { color:#647888; }
    :root[data-theme="dark"] .wrap::-webkit-scrollbar-thumb { background:#2c3b48; }
    :root[data-theme="dark"] .wrap::-webkit-scrollbar-thumb:hover { background:#3a4d5e; }
    :root[data-theme="dark"] .close:hover { background:#3a1f23; color:#ff8a9a; }
    :root[data-theme="dark"] .status { color:#ff8a9a; }
    /* Logo en blanc plein sur fond sombre (silhouette) */
    :root[data-theme="dark"] .brand .logo { filter:brightness(0) invert(1); }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="brand"><img class="logo" src="../assets/icon.png" alt="" /> Correctify</div>
    <div class="winbtns"><button id="close" class="close" data-i18n-title="opt.closeTitle" title="Fermer">✕</button></div>
  </div>

  <div class="wrap">
    <span class="eyebrow" data-i18n="contact.eyebrow">CONTACT &amp; RETOURS</span>
    <p class="sub" data-i18n="contact.sub">Un bug, une idée, ou simplement un avis ? Écrivez-nous, on lit tout.</p>

    <div class="card">
      <label for="category" data-i18n="contact.categoryLabel">Type de message</label>
      <div class="field">
        <select id="category">
          <option value="bug" data-i18n="contact.cat.bug">Bug / problème</option>
          <option value="feature" data-i18n="contact.cat.feature">Nouvelle fonctionnalité</option>
          <option value="feedback" data-i18n="contact.cat.feedback">Avis / retour</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="two">
        <div>
          <label for="name" data-i18n="contact.nameLabel">Nom</label>
          <div class="field"><input id="name" type="text" maxlength="80" spellcheck="false" data-i18n-placeholder="contact.namePlaceholder" placeholder="Votre nom (optionnel)" /></div>
        </div>
        <div>
          <label for="email" data-i18n="contact.emailLabel">E-mail</label>
          <div class="field"><input id="email" type="email" maxlength="120" spellcheck="false" data-i18n-placeholder="contact.emailPlaceholder" placeholder="vous@exemple.com (pour la réponse)" /></div>
        </div>
      </div>
    </div>

    <div class="card">
      <label for="message" data-i18n="contact.messageLabel">Message</label>
      <div class="field">
        <textarea id="message" maxlength="7800" data-i18n-placeholder="contact.messagePlaceholder" placeholder="Décrivez le bug, votre idée ou votre avis…"></textarea>
      </div>
    </div>

    <div class="actions">
      <button id="send" class="btn primary" type="button" data-i18n="contact.send">Envoyer</button>
      <p class="status" id="status"></p>
    </div>
  </div>

  <script src="contact.js"></script>
</body>
</html>
