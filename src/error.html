<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self' data:;" />
  <style>
    html, body { margin:0; height:100%; background:transparent; overflow:hidden;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; -webkit-user-select:none; cursor:default; }
    .panel {
      margin:6px; padding:12px 14px; background:rgba(255,255,255,.99);
      border:1px solid #f3d2d7; border-radius:14px; box-shadow:0 12px 34px rgba(196,40,60,.18);
    }
    .head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .logo { width:20px; height:20px; border-radius:6px; flex:0 0 auto; }
    .brand { font-size:13px; font-weight:800; color:#15212e; }
    .badge {
      margin-left:auto; display:inline-flex; align-items:center; gap:5px;
      font-size:11px; font-weight:700; color:#c0392b; background:#fdecec;
      border:1px solid #f5c6cb; padding:2px 9px; border-radius:999px;
    }
    .badge .x {
      width:14px; height:14px; flex:0 0 auto; border-radius:50%; color:#fff;
      background:linear-gradient(135deg,#ff7a7a,#d0394b); display:grid; place-items:center; font-size:9px; font-weight:700;
    }
    .msg { margin:0; font-size:12.5px; line-height:1.45; color:#3a4a57; }

    /* ----- Mode sombre (data-theme="dark" sur <html>, posé via le payload) ---- */
    :root[data-theme="dark"] .panel { background:rgba(22,34,46,.99); border-color:#5a2a30; box-shadow:0 12px 34px rgba(0,0,0,.5); }
    :root[data-theme="dark"] .brand { color:#e6eef5; }
    :root[data-theme="dark"] .badge { color:#ff8a9a; background:#2a1418; border-color:#5a2a30; }
    :root[data-theme="dark"] .msg { color:#c4d2dd; }
    :root[data-theme="dark"] .logo { filter:brightness(0) invert(1); }
  </style>
</head>
<body>
  <div class="panel">
    <div class="head">
      <img class="logo" src="../assets/icon.png" alt="" />
      <span class="brand">Correctify</span>
      <span class="badge"><span class="x">✕</span> <span id="badge">Erreur</span></span>
    </div>
    <p class="msg" id="msg"></p>
  </div>
  <script>
    try {
      // Payload localisé : { badge, msg }. textContent : aucune injection HTML possible.
      var d = JSON.parse(decodeURIComponent((location.hash || "").slice(1)) || "{}");
      document.documentElement.setAttribute("data-theme", d.theme === "dark" ? "dark" : "light");
      if (d.badge) document.getElementById("badge").textContent = d.badge;
      document.getElementById("msg").textContent = d.msg || "";
    } catch (e) { /* rien */ }
  </script>
</body>
</html>
